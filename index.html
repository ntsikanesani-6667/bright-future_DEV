<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ntsikane Godfrey Sani">
    <link rel="stylesheet" href="css/bright_future.css">
    <script defer src="js/bright_future.js"></script>
	<link rel="icon" href="img/icon.jpg">
    <title>BRIGHT@FUTURE -index-</title>
</head>
<body>
    <div id="container" class="hidden">
        <h2>BRIGHT@FUTURE</h2>
        <div id="menu" class="menu">
            <nav id="navbar" class="navbar">
                <ul id="links" class="links">
                    <div>
                        <button id="open-login-btn" class="open-login-btn">LOGIN</button>
                        <button id="open-signup-btn" class="open-signup-btn">SIGNUP</button>
                    </div>
                </ul>
            </nav>
        </div>
        <div id="overlay" class="OverLay">
            <div id="formbox" class="formbox">
                <button id="CloseLoginBtn" class="CloseLoginBtn">close</button>
                <form id="LoginForm" class="LoginForm">
                    <span>Log In!</span>
                    <input type="text" placeholder="Username" id="LoginUser" class="LoginUser" minlength="3" maxlength="30" required><br>
                    <input type="password" placeholder="Password" id="LoginPassword" class="LoginPassword" minlength="8" maxlength="15" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[a-zA-Z]){8,}$" required><br><br>
                    <button type="submit">Login</button>
                </form>
                <div id="status" class="status"></div>
            </div>
        </div>
        <div id="over-lay" class="Over-Lay">
            <div id="form-box" class="form-box">
                <button id="CloseSignupBtn" class="CloseSignupBtn">close</button>
                <form id="SignupForm" class="SignupForm">
                    <span>Create Account!</span>
                    <input type="text" placeholder="Choose your username" id="SignupUser" class="SignupUser" minlength="3" maxlength="30" required><br>
                    <input type="password" placeholder="Create your password" id="SignupPassword" class="SignupPassword" minlength="8" maxlength="15" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[a-zA-Z]){8,}$" required><br><br>
                    <button type="submit">SignUp</button>
                </form>
                <div id="Status" class="Status"></div>
            </div>
        </div>
		<div id="stage" class="Stage">
			<div class="scene">
				<div class="cube">
					<div class="face front">BRIGHT@FUTURE</div>
					<div class="face back">BRIGHT@FUTURE</div>
					<div class="face left">BRIGHT@FUTURE</div>
					<div class="face right">BRIGHT@FUTURE</div>
					<div class="face top">BRIGHT@FUTURE</div>
					<div class="face bottom">BRIGHT@FUTURE</div>
				</div>
			</div>
		</div>
    </div>
</body>
</html>
